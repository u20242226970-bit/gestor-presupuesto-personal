<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceRank - Perfil</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark navbar-custom px-4">
        <span class="navbar-brand fw-bold fs-4"><i class="bi bi-piggy-bank-fill"></i> FinanceRank</span>
        <div class="d-flex align-items-center gap-3">
            <div class="btn-group btn-group-sm">
                <button class="btn btn-outline-light" data-idioma="es" onclick="cambiarIdioma('es')">ES</button>
                <button class="btn btn-outline-light" data-idioma="en" onclick="cambiarIdioma('en')">EN</button>
            </div>
            <span class="text-white" id="nombreUsuario"></span>
            <button onclick="cerrarSesion()" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right"></i> <span data-i18n="nav_salir">Salir</span>
            </button>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <div class="col-lg-2 sidebar">
                <nav class="nav flex-column">
                    <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> <span data-i18n="nav_dashboard">Dashboard</span></a>
                    <a class="nav-link" href="gastos.html"><i class="bi bi-wallet2"></i> <span data-i18n="nav_gastos">Gastos</span></a>
                    <a class="nav-link" href="metas.html"><i class="bi bi-bullseye"></i> <span data-i18n="nav_metas">Metas</span></a>
                    <a class="nav-link active" href="perfil.html"><i class="bi bi-person-circle"></i> <span data-i18n="nav_perfil">Perfil</span></a>
                    <a class="nav-link" href="leaderboard.html"><i class="bi bi-trophy"></i> <span data-i18n="nav_ranking">Ranking</span></a>
                </nav>
            </div>

            <!-- CONTENIDO -->
            <div class="col-lg-10 main-content">
                <h4 class="fw-bold mb-4" data-i18n="perfil_titulo">Mi Perfil</h4>

                <div class="row">
                    <!-- Tarjeta de rango -->
                    <div class="col-lg-4">
                        <div id="rangoContainer" class="rank-container rank-piedra">
                            <div class="rank-icon" id="rangoEmoji">🪨</div>
                            <div class="rank-name" id="rangoNombre">PIEDRA</div>
                            <div class="text-white-50 mb-2" id="rangoPorcentaje">0% del ingreso ahorrado</div>
                            <div class="rank-progress">
                                <div class="rank-progress-bar" id="rangoProgressBar" style="width: 0%"></div>
                            </div>
                            <small class="text-white-50" id="rangoSiguiente"></small>
                        </div>
                    </div>

                    <!-- Datos + edicion -->
                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm rounded-4 mb-4">
                            <div class="card-body p-4">
                                <h5 class="fw-bold mb-3"><i class="bi bi-person-vcard"></i> <span data-i18n="perfil_datos">Datos de la cuenta</span></h5>
                                <div class="row mb-2">
                                    <div class="col-4 text-muted" data-i18n="perfil_usuario">Usuario</div>
                                    <div class="col-8 fw-semibold" id="infoUsername">-</div>
                                </div>
                                <div class="row mb-2">
                                    <div class="col-4 text-muted" data-i18n="perfil_rol">Rol</div>
                                    <div class="col-8"><span class="badge bg-primary" id="infoRol">-</span></div>
                                </div>
                                <div class="row mb-2">
                                    <div class="col-4 text-muted" data-i18n="perfil_ingreso">Ingreso mensual</div>
                                    <div class="col-8 fw-semibold text-success" id="infoIngreso">-</div>
                                </div>
                                <div class="row">
                                    <div class="col-4 text-muted" data-i18n="perfil_ahorro">Ahorro mensual</div>
                                    <div class="col-8 fw-semibold text-success" id="infoAhorro">-</div>
                                </div>
                            </div>
                        </div>

                        <div class="card border-0 shadow-sm rounded-4">
                            <div class="card-body p-4">
                                <h5 class="fw-bold mb-3"><i class="bi bi-pencil-square"></i> <span data-i18n="perfil_editar">Editar perfil</span></h5>
                                <div id="mensajePerfil" class="alert d-none"></div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold" data-i18n="perfil_nombre">Nombre completo</label>
                                    <input type="text" id="editNombre" class="form-control">
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-semibold" data-i18n="perfil_ingreso">Ingreso mensual</label>
                                        <div class="input-group">
                                            <span class="input-group-text">$</span>
                                            <input type="number" id="editIngreso" class="form-control">
                                        </div>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label fw-semibold" data-i18n="perfil_ahorro">Ahorro mensual</label>
                                        <div class="input-group">
                                            <span class="input-group-text">$</span>
                                            <input type="number" id="editAhorro" class="form-control">
                                        </div>
                                    </div>
                                </div>
                                <button onclick="guardarPerfil()" class="btn btn-primary fw-bold">
                                    <i class="bi bi-check-lg"></i> <span data-i18n="perfil_guardar">Guardar cambios</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery (antes de app.js) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script src="i18n.js"></script>
    <script>
        verificarSesion();

        let usuarioActual = null;

        async function cargarPerfil() {
            $('#nombreUsuario').html('<i class="bi bi-person-circle"></i> ' + localStorage.getItem('usuarioNombre'));

            usuarioActual = await apiAjax('GET', '/api/usuarios/me');

            $('#infoUsername').text(usuarioActual.username);
            $('#infoRol').text(usuarioActual.rol);
            $('#infoIngreso').text(formatearMoney(usuarioActual.ingresoMensual || 0));
            $('#infoAhorro').text(formatearMoney(usuarioActual.ahorroMensual || 0));

            $('#editNombre').val(usuarioActual.nombre || '');
            $('#editIngreso').val(usuarioActual.ingresoMensual || '');
            $('#editAhorro').val(usuarioActual.ahorroMensual || '');

            pintarRango();
        }

        // Pinta la tarjeta de rango en el idioma actual
        function pintarRango() {
            if (!usuarioActual) return;
            const ingreso = usuarioActual.ingresoMensual || 0;
            const ahorro = usuarioActual.ahorroMensual || 0;
            const porcentaje = ingreso > 0 ? (ahorro / ingreso) * 100 : 0;
            const rango = calcularRango(ingreso, ahorro);
            $('#rangoContainer').attr('class', `rank-container ${rango.clase}`);
            $('#rangoEmoji').text(rango.emoji);
            $('#rangoNombre').text(traducirRango(rango.clase).toUpperCase());
            $('#rangoPorcentaje').text(porcentaje.toFixed(1) + '% ' + (getIdioma() === 'en' ? 'of income saved' : 'del ingreso ahorrado'));
            const progreso = rango.max > rango.min ? ((porcentaje - rango.min) / (rango.max - rango.min)) * 100 : 100;
            $('#rangoProgressBar').css('width', Math.min(Math.max(progreso, 0), 100) + '%');
            if (rango.siguiente) {
                const sig = getIdioma() === 'en' ? 'Next' : 'Siguiente';
                $('#rangoSiguiente').text(`${sig}: ${traducirRango('rank-' + rango.siguiente.toLowerCase())} (${rango.max}%)`);
            } else {
                $('#rangoSiguiente').text(getIdioma() === 'en' ? 'Max rank reached! 👑' : '¡Rango maximo alcanzado! 👑');
            }
        }

        async function guardarPerfil() {
            const body = {
                nombre: $('#editNombre').val(),
                ingresoMensual: parseFloat($('#editIngreso').val()) || 0,
                ahorroMensual: parseFloat($('#editAhorro').val()) || 0
            };

            try {
                await apiAjax('PUT', `/api/usuarios/${usuarioActual.id}`, body);
                const msg = getIdioma() === 'en' ? '✅ Profile updated successfully' : '✅ Perfil actualizado correctamente';
                $('#mensajePerfil').attr('class', 'alert alert-success').text(msg);
                localStorage.setItem('usuarioNombre', body.nombre);
                cargarPerfil();
                setTimeout(() => $('#mensajePerfil').addClass('d-none'), 3000);
            } catch (e) {
                const msg = getIdioma() === 'en' ? 'Error updating profile' : 'Error al actualizar el perfil';
                $('#mensajePerfil').attr('class', 'alert alert-danger').text(msg);
            }
        }

        cargarPerfil();

        // Vuelve a pintar el rango al cambiar el idioma
        function alCambiarIdioma() {
            pintarRango();
        }
    </script>
</body>
</html>
