<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceRank - Metas</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark navbar-custom px-4">
        <span class="navbar-brand fw-bold fs-4"><i class="bi bi-piggy-bank-fill"></i> FinanceRank</span>
        <div class="d-flex align-items-center gap-3">
            <div class="btn-group btn-group-sm">
                <button class="btn btn-outline-light" data-idioma="es" onclick="cambiarIdioma('es')">ES</button>
                <button class="btn btn-outline-light" data-idioma="en" onclick="cambiarIdioma('en')">EN</button>
            </div>
            <span class="text-white" id="nombreUsuario"></span>
            <button onclick="cerrarSesion()" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right"></i> <span data-i18n="nav_salir">Salir</span>
            </button>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <div class="col-lg-2 sidebar">
                <nav class="nav flex-column">
                    <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> <span data-i18n="nav_dashboard">Dashboard</span></a>
                    <a class="nav-link" href="gastos.html"><i class="bi bi-wallet2"></i> <span data-i18n="nav_gastos">Gastos</span></a>
                    <a class="nav-link active" href="metas.html"><i class="bi bi-bullseye"></i> <span data-i18n="nav_metas">Metas</span></a>
                    <a class="nav-link" href="perfil.html"><i class="bi bi-person-circle"></i> <span data-i18n="nav_perfil">Perfil</span></a>
                    <a class="nav-link" href="leaderboard.html"><i class="bi bi-trophy"></i> <span data-i18n="nav_ranking">Ranking</span></a>
                </nav>
            </div>

            <!-- CONTENIDO -->
            <div class="col-lg-10 main-content">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0"><i class="bi bi-bullseye"></i> <span data-i18n="metas_titulo">Mis Metas de Ahorro</span></h4>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalMeta">
                        <i class="bi bi-plus-lg"></i> <span data-i18n="metas_nueva">Nueva Meta</span>
                    </button>
                </div>

                <!-- METAS -->
                <div class="row g-4" id="contenedorMetas">
                    <div class="col-12 text-center text-muted py-5">
                        Cargando metas...
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- MODAL NUEVA META -->
    <div class="modal fade" id="modalMeta" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content rounded-4">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" data-i18n="metas_modal_titulo">Nueva Meta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-4">
                    <div id="alertaMeta" class="alert alert-danger d-none"></div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" data-i18n="metas_form_nombre">Nombre de la meta</label>
                        <input type="text" id="metaNombre" class="form-control" placeholder="Ej: Mi Moto">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" data-i18n="metas_form_emoji">Emoji</label>
                        <input type="text" id="metaEmoji" class="form-control" placeholder="🏍️">
                        <small class="text-muted" data-i18n="metas_form_emoji_help">Copia un emoji que represente tu meta</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" data-i18n="metas_form_precio">Precio objetivo</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" id="metaPrecio" class="form-control" placeholder="5000000">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" data-i18n="metas_form_fecha">Fecha limite (opcional)</label>
                        <input type="date" id="metaFecha" class="form-control">
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="metas_cancelar">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="guardarMeta()" data-i18n="metas_crear">Crear Meta</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL ABONAR -->
    <div class="modal fade" id="modalAbono" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content rounded-4">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" data-i18n="metas_abonar_titulo">Abonar a Meta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-4">
                    <input type="hidden" id="abonoMetaId">
                    <p class="text-muted" id="abonoMetaNombre"></p>

                    <div class="mb-3">
                        <label class="form-label fw-semibold" data-i18n="metas_abono_monto">Monto a abonar</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" id="abonoMonto" class="form-control" placeholder="50000">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold" data-i18n="metas_abono_desc">Descripcion</label>
                        <input type="text" id="abonoDescripcion" class="form-control" placeholder="Ahorro semana 1">
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="metas_cancelar">Cancelar</button>
                    <button type="button" class="btn btn-success" onclick="guardarAbono()">
                        <i class="bi bi-piggy-bank"></i> <span data-i18n="metas_abonar_boton">Abonar</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery (antes de app.js) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script src="i18n.js"></script>
    <script>
        verificarSesion();
        $('#nombreUsuario').html('<i class="bi bi-person-circle"></i> ' + localStorage.getItem('usuarioNombre'));

        async function cargarMetas() {
            const usuarioId = getUsuarioId();
            const metas = await apiAjax('GET', `/api/metas/usuario/${usuarioId}`);
            const contenedor = $('#contenedorMetas');

            // Textos que dependen del idioma
            const t = {
                sinMetas: getIdioma() === 'en' ? "You don't have goals yet" : 'No tienes metas todavia',
                crearPrimera: getIdioma() === 'en' ? 'Create your first savings goal' : 'Crea tu primera meta de ahorro',
                progreso: getIdioma() === 'en' ? 'Progress' : 'Progreso',
                ahorrado: getIdioma() === 'en' ? 'Saved' : 'Ahorrado',
                objetivo: getIdioma() === 'en' ? 'Target' : 'Objetivo',
                falta: getIdioma() === 'en' ? 'Remaining' : 'Te falta',
                fechaLimite: getIdioma() === 'en' ? 'Deadline' : 'Fecha limite',
                abonar: getIdioma() === 'en' ? 'Add Funds' : 'Abonar'
            };

            if (metas.length === 0) {
                contenedor.html(`
                    <div class="col-12 text-center py-5">
                        <div style="font-size:80px">🎯</div>
                        <h5 class="text-muted mt-3">${t.sinMetas}</h5>
                        <p class="text-muted">${t.crearPrimera}</p>
                    </div>`);
                return;
            }

            contenedor.html(metas.map(m => {
                const porcentaje = m.precioObjetivo > 0
                    ? Math.min((m.montoAhorrado / m.precioObjetivo) * 100, 100)
                    : 0;
                const falta = Math.max(0, m.precioObjetivo - m.montoAhorrado);

                return `
                <div class="col-lg-4 col-md-6">
                    <div class="meta-card card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <div>
                                <span style="font-size:30px">${m.emoji || '🎯'}</span>
                                <span class="fw-bold ms-2">${m.nombre}</span>
                            </div>
                            <button class="btn btn-sm btn-danger" onclick="eliminarMeta(${m.id})">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between mb-1">
                                <small class="text-muted">${t.progreso}</small>
                                <small class="fw-bold">${porcentaje.toFixed(1)}%</small>
                            </div>
                            <div class="progress mb-3">
                                <div class="progress-bar bg-primary" style="width: ${porcentaje}%"></div>
                            </div>
                            <div class="row text-center mb-3">
                                <div class="col-6">
                                    <div class="text-muted small">${t.ahorrado}</div>
                                    <div class="fw-bold text-success">${formatearMoney(m.montoAhorrado || 0)}</div>
                                </div>
                                <div class="col-6">
                                    <div class="text-muted small">${t.objetivo}</div>
                                    <div class="fw-bold">${formatearMoney(m.precioObjetivo)}</div>
                                </div>
                            </div>
                            <div class="text-center text-muted small mb-3">
                                ${t.falta}: <strong class="text-danger">${formatearMoney(falta)}</strong>
                            </div>
                            ${m.fechaLimite ? `<div class="text-center text-muted small mb-3">📅 ${t.fechaLimite}: ${m.fechaLimite}</div>` : ''}
                            <button class="btn btn-success w-100" onclick="abrirAbono(${m.id}, '${m.nombre}')">
                                <i class="bi bi-piggy-bank"></i> ${t.abonar}
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join(''));
        }

        async function guardarMeta() {
            const nombre = $('#metaNombre').val();
            const emoji = $('#metaEmoji').val();
            const precioObjetivo = $('#metaPrecio').val();
            const fechaLimite = $('#metaFecha').val();

            if (!nombre || !precioObjetivo) {
                const msg = getIdioma() === 'en' ? 'Complete the required fields' : 'Completa los campos obligatorios';
                mostrarError('alertaMeta', msg);
                return;
            }

            const usuarioId = getUsuarioId();
            const body = {
                nombre,
                emoji: emoji || '🎯',
                precioObjetivo: parseFloat(precioObjetivo),
                montoAhorrado: 0,
                fechaLimite: fechaLimite || null,
                usuario: { id: parseInt(usuarioId) }
            };

            try {
                await apiAjax('POST', '/api/metas', body);
                bootstrap.Modal.getInstance(document.getElementById('modalMeta')).hide();
                cargarMetas();
            } catch (e) {
                const msg = getIdioma() === 'en' ? 'Error creating the goal' : 'Error al crear la meta';
                mostrarError('alertaMeta', msg);
            }
        }

        function abrirAbono(metaId, metaNombre) {
            $('#abonoMetaId').val(metaId);
            const prefijo = getIdioma() === 'en' ? 'Goal: ' : 'Meta: ';
            $('#abonoMetaNombre').text(prefijo + metaNombre);
            new bootstrap.Modal(document.getElementById('modalAbono')).show();
        }

        async function guardarAbono() {
            const metaId = $('#abonoMetaId').val();
            const monto = $('#abonoMonto').val();
            const descripcion = $('#abonoDescripcion').val();

            if (!monto) return;

            const body = {
                monto: parseFloat(monto),
                fecha: new Date().toISOString().split('T')[0],
                descripcion: descripcion || 'Abono',
                meta: { id: parseInt(metaId) }
            };

            try {
                await apiAjax('POST', '/api/abonos', body);
                bootstrap.Modal.getInstance(document.getElementById('modalAbono')).hide();
                $('#abonoMonto').val('');
                $('#abonoDescripcion').val('');
                cargarMetas();
            } catch (e) {
                const msg = getIdioma() === 'en' ? 'Error adding funds' : 'Error al registrar el abono';
                alert(msg);
            }
        }

        async function eliminarMeta(id) {
            const confirmMsg = getIdioma() === 'en' ? 'Delete this goal?' : 'Eliminar esta meta?';
            if (!confirm(confirmMsg)) return;
            await apiAjax('DELETE', `/api/metas/${id}`);
            cargarMetas();
        }

        cargarMetas();

        // Vuelve a pintar las metas al cambiar el idioma (para los textos dinamicos)
        function alCambiarIdioma() {
            cargarMetas();
        }
    </script>
</body>
</html>
