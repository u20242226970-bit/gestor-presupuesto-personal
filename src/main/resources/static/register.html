<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceRank - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="login-body">

    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            <div class="col-lg-5">
                <div class="login-card p-5">

                    <h2 class="fw-bold mb-1 text-center">Crear cuenta</h2>
                    <p class="text-muted text-center mb-4">Comienza tu camino financiero</p>

                    <div id="alertaError" class="alert alert-danger d-none"></div>
                    <div id="alertaExito" class="alert alert-success d-none"></div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre completo</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                            <input type="text" id="nombre" class="form-control" placeholder="Luis Felipe Saldarriaga">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-at"></i></span>
                            <input type="text" id="username" class="form-control" placeholder="luisfelipe123">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contrasena</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" id="password" class="form-control" placeholder="Minimo 6 caracteres">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Ingreso mensual</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
                            <input type="number" id="ingresoMensual" class="form-control" placeholder="2000000">
                        </div>
                        <small class="text-muted">Este valor se usa para calcular tu rango de ahorro</small>
                    </div>

                    <button onclick="registrar()" class="btn btn-primary w-100 py-2 fw-bold fs-5">
                        Crear cuenta
                    </button>

                    <hr class="my-4">

                    <p class="text-center text-muted">
                        Ya tienes cuenta?
                        <a href="index.html" class="text-primary fw-bold">Inicia sesion</a>
                    </p>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
