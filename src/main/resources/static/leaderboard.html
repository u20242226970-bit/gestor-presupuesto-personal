<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceRank - Ranking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark navbar-custom px-4">
        <span class="navbar-brand fw-bold fs-4">💰 FinanceRank</span>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white" id="nombreUsuario"></span>
            <button onclick="cerrarSesion()" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right"></i> Salir
            </button>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <div class="col-lg-2 sidebar">
                <nav class="nav flex-column">
                    <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
                    <a class="nav-link" href="gastos.html"><i class="bi bi-wallet2"></i> Gastos</a>
                    <a class="nav-link" href="metas.html"><i class="bi bi-bullseye"></i> Metas</a>
                    <a class="nav-link" href="perfil.html"><i class="bi bi-person-circle"></i> Perfil</a>
                    <a class="nav-link active" href="leaderboard.html"><i class="bi bi-trophy"></i> Ranking</a>
                </nav>
            </div>

            <!-- CONTENIDO -->
            <div class="col-lg-10 main-content">
                <h4 class="fw-bold mb-1"><i class="bi bi-trophy-fill"></i> Ranking de Ahorradores</h4>
                <p class="text-muted mb-4">Clasificacion segun el porcentaje de ingreso ahorrado</p>

                <!-- PODIO TOP 3 -->
                <div id="podio" class="row g-3 mb-4 justify-content-center"></div>

                <!-- TABLA COMPLETA -->
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-3">Tabla de posiciones</h5>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-dark">
                                    <tr>
                                        <th class="text-center">#</th>
                                        <th>Rango</th>
                                        <th>Nombre</th>
                                        <th>Usuario</th>
                                        <th class="text-end">% Ahorro</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaRanking">
                                    <tr><td colspan="5" class="text-center text-muted py-3">Cargando ranking...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        verificarSesion();

        const MEDALLAS = ['🥇', '🥈', '🥉'];

        async function cargarRanking() {
        	document.getElementById('nombreUsuario').innerHTML = '<i class="bi bi-person-circle"></i> ' + localStorage.getItem('usuarioNombre');
            const miId = String(getUsuarioId());

            const res = await fetch(`${API}/api/usuarios`, {
                headers: { 'Authorization': getAuth() }
            });
            let usuarios = await res.json();

            // Calcular porcentaje y rango de cada usuario
            usuarios = usuarios.map(u => {
                const ingreso = u.ingresoMensual || 0;
                const ahorro = u.ahorroMensual || 0;
                const porcentaje = ingreso > 0 ? (ahorro / ingreso) * 100 : 0;
                return { ...u, porcentaje, rango: calcularRango(ingreso, ahorro) };
            });

            // Ordenar de mayor a menor porcentaje
            usuarios.sort((a, b) => b.porcentaje - a.porcentaje);

            // ===== PODIO (solo si hay 3 o mas) =====
            const podio = document.getElementById('podio');
            podio.innerHTML = '';
            if (usuarios.length >= 3) {
                // Orden visual: 2do, 1ro (centro y arriba), 3ro
                [1, 0, 2].forEach(i => {
                    const u = usuarios[i];
                    podio.innerHTML += `
                        <div class="col-lg-3 col-md-4">
                            <div class="card border-0 shadow-sm rounded-4 text-center p-3 ${i === 0 ? '' : 'mt-lg-4'}">
                                <div style="font-size:42px">${MEDALLAS[i]}</div>
                                <div style="font-size:40px">${u.rango.emoji}</div>
                                <div class="fw-bold text-truncate">${u.nombre}</div>
                                <small class="text-muted">@${u.username}</small>
                                <div class="fw-bold text-success fs-5 mt-1">${u.porcentaje.toFixed(1)}%</div>
                            </div>
                        </div>`;
                });
            }

            // ===== TABLA =====
            const tabla = document.getElementById('tablaRanking');
            if (usuarios.length === 0) {
                tabla.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">No hay usuarios registrados</td></tr>';
                return;
            }

            tabla.innerHTML = usuarios.map((u, idx) => {
                const pos = idx + 1;
                const posHtml = pos <= 3 ? MEDALLAS[pos - 1] : `<span class="fw-bold text-muted">${pos}</span>`;
                const esYo = String(u.id) === miId;
                const etiquetaYo = esYo ? ' <span class="badge bg-info">Tú</span>' : '';
                return `
                    <tr class="${esYo ? 'table-primary' : ''}">
                        <td class="text-center fs-5">${posHtml}</td>
                        <td>${u.rango.emoji} <span class="fw-semibold">${u.rango.nombre}</span></td>
                        <td class="fw-semibold">${u.nombre}${etiquetaYo}</td>
                        <td class="text-muted">@${u.username}</td>
                        <td class="text-end fw-bold text-success">${u.porcentaje.toFixed(1)}%</td>
                    </tr>`;
            }).join('');
        }

        cargarRanking();
    </script>
</body>
</html>
